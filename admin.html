<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Tajali</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/admin.css">
</head>
<body>
    <header>
        <nav class="navbar container">
            <div class="logo">Tajali Admin</div>
            <button class="menu-btn" id="logoutBtn" style="display: none; background:var(--accent-purple); padding:5px 10px; border-radius:5px; font-size:1rem;">Logout</button>
            <ul class="nav-links">
                <li><a href="index.html">Back to Site</a></li>
            </ul>
        </nav>
    </header>

    <main class="page-top-padding container">
        
        <!-- Login Section -->
        <section id="loginSection" class="glass-panel" style="max-width: 500px; margin: 5rem auto; padding: 2rem;">
            <h2>Admin Login</h2>
            <p style="margin-bottom: 1.5rem; color:var(--text-secondary); font-size:0.9rem;">Enter your GitHub Personal Access Token to manage content.</p>
            <div class="form-group">
                <input type="password" id="ghTokenInput" class="form-control" placeholder="ghp_xxxxxxxxxxxx">
            </div>
            <button id="loginSubmitBtn" class="btn btn-primary" style="width: 100%;">Login</button>
            <div id="loginError" style="color: #ef4444; margin-top: 1rem; display: none;">Invalid token or network error.</div>
        </section>

        <!-- Admin Dashboard (Hidden by default) -->
        <section id="dashboardSection" style="display: none;">
            <div class="admin-header">
                <h1 class="section-title" style="text-align:left; margin-bottom: 1rem;">Content Manager</h1>
                <button id="addNewBtn" class="btn btn-primary">+ Add New</button>
            </div>

            <div class="tabs">
                <button class="tab-btn active" data-target="projects">Projects</button>
                <button class="tab-btn" data-target="experience">Experience</button>
                <button class="tab-btn" data-target="achievements">Prestasi</button>
                <button class="tab-btn" data-target="certificates">Certificates</button>
            </div>

            <div class="tab-content" id="tableContainer">
                <!-- Table rendered by JS -->
                <div class="loading-spinner">Loading data from GitHub...</div>
            </div>
        </section>
    </main>

    <!-- CRUD Form Modal -->
    <div class="modal-overlay" id="crudModal">
        <div class="modal-content crud-modal-content">
            <button class="modal-close" id="closeCrudModal">&times;</button>
            <h2 id="modalFormTitle" style="margin-bottom: 1rem;">Add/Edit</h2>
            <form id="crudForm">
                <div id="dynamicFormFields">
                    <!-- Fields injected by JS based on active tab -->
                </div>
                <div style="display: flex; justify-content: flex-end; gap: 1rem; margin-top: 2rem;">
                    <button type="button" class="btn btn-outline" id="cancelCrudBtn">Cancel</button>
                    <button type="submit" class="btn btn-primary" id="saveCrudBtn">Save Changes</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/github-api.js"></script>
    <script src="js/admin.js"></script>
</body>
</html>
