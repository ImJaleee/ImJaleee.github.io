<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projects | Ahmad Tajali</title>
    <!-- Styles -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/home.css"> <!-- Reusing project-card styles -->
    <link rel="stylesheet" href="css/projects.css">
</head>
<body>
    <!-- Soft Background Ornaments -->
    <div class="bg-ornament bg-ornament-1"></div>
    <div class="bg-ornament bg-ornament-2"></div>

    <div class="floating-nav-container">
        <nav class="floating-nav">
            <a href="index.html" aria-label="Home">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 21v-8a1 1 0 0 0-1-1h-4a1 1 0 0 0-1 1v8"></path><path d="M3 10a2 2 0 0 1 .709-1.528l7-5.999a2 2 0 0 1 2.582 0l7 5.999A2 2 0 0 1 21 10v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path></svg>
            </a>
            <a href="profile.html">About</a>
            <a href="projects.html" class="active">Project</a>
            <a href="certificate.html">Certificates</a>
        </nav>
    </div>

    <main class="page-top-padding" style="padding-top: 100px; min-height: 80vh;">
        <section class="container">
            <div class="projects-header text-center" style="text-align: center; margin-bottom: 3rem;">
                <h1 class="section-title">My <span>Projects</span></h1>
                <p style="color:var(--text-secondary); max-width: 600px; margin: 0 auto;">A collection of my work focusing on Data Science, Data Analyst, and Web Development. Click on any project to see the detailed breakdown.</p>
            </div>

            <!-- Filter Buttons -->
            <div class="filter-container" id="filterContainer">
                <button class="filter-btn active" data-filter="all">All</button>
                <button class="filter-btn" data-filter="Data Analyst">Data Analyst</button>
                <button class="filter-btn" data-filter="Data Science">Data Science</button>
                <button class="filter-btn" data-filter="Web">Web/App</button>
            </div>

            <!-- Projects Grid -->
            <div class="projects-grid" id="allProjectsContainer" style="margin-top: 3rem;">
                <!-- Rendered by JS -->
            </div>
            
            <div id="noProjectsMsg" style="display:none; text-align:center; padding: 4rem; color: var(--text-secondary);">
                No projects found for this category.
            </div>
        </section>
    </main>

    <!-- Modal Template -->
    <div class="modal-overlay" id="projectModal">
        <div class="modal-content project-detail-modal">
            <button class="modal-close" id="closeProjectModal">&times;</button>
            <div class="modal-body" id="projectModalBody">
                <!-- Modal content rendered by JS -->
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/github-api.js"></script>
    <script src="js/app.js"></script>
    <script src="js/projects.js"></script>
</body>
</html>
